<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Chord Chart Parser</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="parser-card">
    <h1>Chord Chart Parser</h1>

    <textarea id="chartInput" rows="8" placeholder="Paste your chord chart here..."></textarea>
    <button id="parseBtn">Parse Chords</button>

    <div class="chord-output">
      <h2>Chords Found</h2>
      <p id="chordOutput">--</p>
    </div>
  </div>

  <script src="parser.js"></script>
</body>
</html>
